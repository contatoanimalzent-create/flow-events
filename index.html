<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport: previne zoom automático em inputs no iOS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Tema e cor de status bar -->
    <meta name="theme-color" content="#0057E7" />
    <meta name="msapplication-TileColor" content="#0057E7" />

    <!-- PWA / Add to Home Screen -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS Safari: comportamento nativo ao adicionar na tela inicial -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Pulse" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Evita detecção automática de telefone/email no iOS -->
    <meta name="format-detection" content="telephone=no, email=no, address=no" />

    <!-- SEO base -->
    <meta name="description" content="Descubra e compre ingressos para os melhores eventos de cultura, gastronomia, música e lifestyle. Checkout seguro, acesso via QR code." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Pulse" />
    <meta property="og:title" content="Pulse, Ingressos para eventos premium" />
    <meta property="og:description" content="Descubra e compre ingressos para os melhores eventos de cultura, gastronomia, música e lifestyle." />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pulse, Ingressos para eventos premium" />
    <meta name="twitter:description" content="Descubra e compre ingressos para os melhores eventos de cultura, gastronomia, música e lifestyle." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />

    <title>Pulse, Ingressos para eventos premium</title>

    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
